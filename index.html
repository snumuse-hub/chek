<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선생님 대시보드</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', sans-serif; background: #f0f4ff; min-height: 100vh; }

/* 로그인 */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card {
  background: white; border-radius: 20px; padding: 40px 32px;
  width: 100%; max-width: 360px; text-align: center;
  box-shadow: 0 8px 32px rgba(80,100,200,0.12);
}
.login-card .emoji { font-size: 48px; margin-bottom: 16px; }
.login-card h2 { font-size: 20px; font-weight: 700; color: #222; margin-bottom: 24px; line-height: 1.4; }
.login-card input {
  width: 100%; padding: 14px; font-size: 20px; text-align: center;
  border: 2px solid #e0e5f0; border-radius: 12px; outline: none;
  letter-spacing: 6px; margin-bottom: 12px; transition: border 0.2s;
}
.login-card input:focus { border-color: #4a6cf7; }
.btn-login {
  width: 100%; padding: 14px; background: #4a6cf7; color: white;
  font-size: 16px; font-weight: 700; border: none; border-radius: 12px; cursor: pointer;
}
.btn-login:hover { background: #3558e8; }
.login-err { font-size: 13px; color: #e53e3e; margin-top: 10px; display: none; }

/* 대시보드 */
.dash { display: none; padding: 24px 20px; max-width: 860px; margin: 0 auto; }
.dash-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px; flex-wrap: wrap; gap: 10px;
}
.dash-header h1 { font-size: 20px; font-weight: 700; color: #222; }
.dash-header .sub { font-size: 13px; color: #888; margin-top: 4px; }
.header-btns { display: flex; gap: 8px; }
.btn-refresh {
  padding: 8px 16px; background: #4a6cf7; color: white;
  border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
}
.btn-logout {
  padding: 8px 16px; background: #f0f0f0; color: #666;
  border: none; border-radius: 8px; font-size: 13px; cursor: pointer;
}

/* 요약 카드 */
.summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; margin-bottom: 20px; }
.sum-card {
  background: white; border-radius: 14px; padding: 16px 12px;
  text-align: center; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.sum-card .n { font-size: 26px; font-weight: 700; color: #4a6cf7; }
.sum-card .l { font-size: 11px; color: #888; margin-top: 4px; }
.sum-card.gold .n { color: #B8860B; }
.sum-card.green .n { color: #2d9b4e; }
.sum-card.red   .n { color: #e53e3e; }

/* 탭 + 검색 */
.controls { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
.tab-wrap { display: flex; gap: 6px; }
.tab {
  padding: 8px 18px; border-radius: 20px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  background: #f0f0f0; color: #666; transition: all 0.2s;
}
.tab.active { background: #4a6cf7; color: white; }
.search-bar {
  flex: 1; min-width: 160px; padding: 9px 14px; font-size: 14px;
  border: 2px solid #e0e5f0; border-radius: 20px; outline: none; transition: border 0.2s;
}
.search-bar:focus { border-color: #4a6cf7; }

/* 테이블 */
.table-wrap {
  background: white; border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
th {
  background: #f8f9ff; padding: 12px 14px;
  font-size: 12px; font-weight: 600; color: #666;
  text-align: left; border-bottom: 1px solid #eef0f8; white-space: nowrap;
}
td {
  padding: 12px 14px; font-size: 14px; color: #333;
  border-bottom: 1px solid #f5f5f5; vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #f8f9ff; }

/* 달성률 바 */
.mini-bar-bg {
  background: #f0f0f0; border-radius: 99px; height: 6px;
  width: 70px; display: inline-block; overflow: hidden; vertical-align: middle; margin-right: 4px;
}
.mini-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#B8860B,#FFD700); }

.badge-on   { background: #e8ffee; color: #2d9b4e; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
.badge-late { background: #fff3e0; color: #e07800; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; white-space: nowrap; }
.rank { font-size: 16px; }

.empty-row td { text-align: center; color: #aaa; padding: 40px; font-size: 14px; }

@media (max-width: 600px) {
  .summary-grid { grid-template-columns: repeat(2,1fr); }
  th:nth-child(7), td:nth-child(7) { display: none; }
}
</style>
</head>
<body>

<!-- 로그인 -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="emoji">🏫</div>
    <h2>창원예술학교<br>선생님 대시보드</h2>
    <input type="password" id="pwInput" placeholder="••••" maxlength="20">
    <button class="btn-login" onclick="doLogin()">로그인</button>
    <div class="login-err" id="loginErr">비밀번호가 틀렸습니다</div>
  </div>
</div>

<!-- 대시보드 -->
<div class="dash" id="dash">
  <div class="dash-header">
    <div>
      <h1>📊 출석 대시보드</h1>
      <div class="sub" id="monthLabel"></div>
    </div>
    <div class="header-btns">
      <button class="btn-refresh" onclick="loadData()">🔄 새로고침</button>
      <button class="btn-logout"  onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- 요약 -->
  <div class="summary-grid">
    <div class="sum-card">
      <div class="n" id="sumStudents">-</div>
      <div class="l">전체 학생</div>
    </div>
    <div class="sum-card gold">
      <div class="n" id="sumAvg">-</div>
      <div class="l">평균 목표출석</div>
    </div>
    <div class="sum-card green">
      <div class="n" id="sumOnTime">-</div>
      <div class="l">목표출석 달성률</div>
    </div>
    <div class="sum-card red">
      <div class="n" id="sumLate">-</div>
      <div class="l">노력률</div>
    </div>
  </div>

  <!-- 탭 + 검색 -->
  <div class="controls">
    <div class="tab-wrap">
      <button class="tab active" onclick="switchTab(this,'전체')">전체</button>
      <button class="tab"        onclick="switchTab(this,'3반')">3반</button>
      <button class="tab"        onclick="switchTab(this,'4반')">4반</button>
    </div>
    <input class="search-bar" id="searchBar" placeholder="🔍 이름 검색..." oninput="renderTable()">
  </div>

  <!-- 테이블 -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>순위</th>
          <th>반</th>
          <th>이름</th>
          <th>총 출석</th>
          <th>목표출석 🏆</th>
          <th>노력 👍</th>
          <th>달성률</th>
          <th>마지막 출석</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr class="empty-row"><td colspan="8">데이터 불러오는 중...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbz-ct89ZtdQGTojU2SxQbkDuNjTjKOvaoLvTvvTEVnAejgUp58jf9J-EPenlwSgXYlPgw/exec";
const GOAL = 30;
let allData = [], curTab = '전체', savedPw = '';

const now = new Date();
document.getElementById('monthLabel').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 기준`;

function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;
  loadData(pw);
}

async function loadData(pw) {
  const usePw = pw || savedPw;
  try {
    const r = await fetch(`${GAS_URL}?type=dashboard&pw=${encodeURIComponent(usePw)}`);
    const j = await r.json();

    if (!j.success) {
      document.getElementById('loginErr').textContent = j.error === '비밀번호 오류' ? '비밀번호가 틀렸습니다' : '서버 오류. 다시 시도해주세요.';
      document.getElementById('loginErr').style.display = 'block';
      return;
    }

    savedPw = usePw;
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dash').style.display      = 'block';

    allData = j.data || [];
    updateSummary();
    renderTable();
  } catch(e) {
    document.getElementById('loginErr').textContent = '서버 오류. 다시 시도해주세요.';
    document.getElementById('loginErr').style.display = 'block';
  }
}

function num(v) {
  const n = Number(v);
  return Number.isFinite(n) ? n : 0;
}

function updateSummary() {
  const totalStudents = allData.length;
  const totalRecords  = allData.reduce((s,d) => s + num(d.total), 0);
  const onTimeAll     = allData.reduce((s,d) => s + num(d.goal ?? d.onTime), 0);
  const effortAll     = allData.reduce((s,d) => s + num(d.effort ?? d.late), 0);

  // 30일 목표 달성률은 전체 기록이 아니라 목표출석(goal)만 기준으로 계산합니다.
  const avgGoalDays   = totalStudents ? (onTimeAll / totalStudents).toFixed(1) : '0.0';
  const goalPct       = totalStudents ? Math.round((onTimeAll / (totalStudents * GOAL)) * 100) : 0;
  const effortPct     = totalRecords ? Math.round((effortAll / totalRecords) * 100) : 0;

  document.getElementById('sumStudents').textContent = totalStudents + '명';
  document.getElementById('sumAvg').textContent      = avgGoalDays + '일';
  document.getElementById('sumOnTime').textContent   = goalPct + '%';
  document.getElementById('sumLate').textContent     = effortPct + '%';
}

function switchTab(el, tab) {
  curTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderTable();
}


function pad2(n) {
  return String(n).padStart(2, '0');
}

function parseMaybeDate(value) {
  if (value === undefined || value === null) return null;
  const text = String(value).trim();
  if (!text || text === '-' || text === 'undefined' || text === 'null') return null;

  const date = new Date(text);
  if (!isNaN(date.getTime())) return date;
  return null;
}

function formatDateOnly(value) {
  const date = parseMaybeDate(value);
  if (!date) return String(value || '').trim();

  const parts = new Intl.DateTimeFormat('ko-KR', {
    timeZone: 'Asia/Seoul',
    year: 'numeric', month: '2-digit', day: '2-digit'
  }).formatToParts(date);

  const get = type => parts.find(p => p.type === type)?.value || '';
  return `${get('year')}.${get('month')}.${get('day')}`;
}

function formatTimeOnly(value) {
  const date = parseMaybeDate(value);
  if (date) {
    const parts = new Intl.DateTimeFormat('ko-KR', {
      timeZone: 'Asia/Seoul',
      hour: '2-digit', minute: '2-digit',
      hour12: false
    }).formatToParts(date);

    const get = type => parts.find(p => p.type === type)?.value || '00';
    return `${get('hour')}:${get('minute')}`;
  }

  const text = String(value || '').trim();
  const m = text.match(/(\d{1,2})\s*[:시]\s*(\d{1,2})/);
  if (m) return `${pad2(m[1])}:${pad2(m[2])}`;
  return text;
}

function formatLastAttendance(lastDate, lastTime) {
  const d = formatDateOnly(lastDate);
  const t = formatTimeOnly(lastTime);
  return [d, t].filter(Boolean).join(' ');
}

function renderTable() {
  const q = document.getElementById('searchBar').value.trim();
  let data = allData;
  if (curTab !== '전체') data = data.filter(d => d.className === curTab);
  if (q) data = data.filter(d => d.name.includes(q));

  if (data.length === 0) {
    document.getElementById('tableBody').innerHTML =
      '<tr class="empty-row"><td colspan="8">해당 학생이 없어요</td></tr>';
    return;
  }

  // 순위와 달성률은 전체 기록 수가 아니라 목표출석(goal) 수 기준입니다.
  data = data.slice().sort((a,b) => {
    const byGoal = num(b.goal ?? b.onTime) - num(a.goal ?? a.onTime);
    if (byGoal !== 0) return byGoal;
    const byEffort = num(b.effort ?? b.late) - num(a.effort ?? a.late);
    if (byEffort !== 0) return byEffort;
    return num(b.total) - num(a.total);
  });

  const ranks = ['🥇','🥈','🥉'];
  document.getElementById('tableBody').innerHTML = data.map((d,i) => {
    const total  = num(d.total);
    const onTime = num(d.goal ?? d.onTime);
    const effort = num(d.effort ?? d.late);
    const pct    = Math.min(Math.round(onTime / GOAL * 100),100);
    const rank   = i < 3 ? `<span class="rank">${ranks[i]}</span>` : `${i+1}`;
    return `<tr>
      <td>${rank}</td>
      <td>${d.className}</td>
      <td><strong>${d.name}</strong></td>
      <td><strong>${total}</strong>회</td>
      <td><span class="badge-on">✅ ${onTime}회</span></td>
      <td><span class="badge-late">👍 ${effort}회</span></td>
      <td>
        <div class="mini-bar-bg"><div class="mini-bar" style="width:${pct}%"></div></div>
        <span style="font-size:12px;color:#888;">${pct}%</span>
      </td>
      <td style="font-size:13px;color:#888;">${formatLastAttendance(d.lastDate, d.lastTime)}</td>
    </tr>`;
  }).join('');
}

function logout() {
  savedPw = '';
  document.getElementById('pwInput').value = '';
  document.getElementById('loginErr').style.display = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
  document.getElementById('dash').style.display      = 'none';
}

document.getElementById('pwInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
